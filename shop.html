<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Modern Fits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between gap-4">
                <a href="index.html" class="text-xl font-bold text-black tracking-tight">MODERN<span class="text-gray-400">FITS</span></a>

                <div class="flex-1 relative">
                    <input type="text" id="searchInput" placeholder="Search furniture or fitting services..."
                           class="w-full bg-gray-100 border-none rounded-full py-2 px-5 text-sm focus:ring-2 focus:ring-black outline-none">
                    <i class="fa-solid fa-magnifying-glass absolute right-4 top-3 text-gray-400 text-sm"></i>
                </div>

                <div class="flex items-center gap-5 text-gray-700">
                    <a href="#" id="userLink"><i class="fa-regular fa-user text-xl"></i></a>
                    <a href="#" id="cartLink" class="relative">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-black text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-slate-900">Shop</h1>
            <div class="flex gap-2">
                <select id="categoryFilter" class="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm">
                    <option value="">All Categories</option>
                    <option value="furniture">Furniture</option>
                    <option value="fitting">Fitting</option>
                </select>
            </div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Products will be loaded here -->
        </div>

        <div id="noProducts" class="hidden text-center py-12">
            <p class="text-slate-500">No products found.</p>
        </div>
    </main>

    <!-- Cart Modal -->
    <div id="cartModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl max-w-md w-full max-h-[80vh] overflow-hidden">
                <div class="p-6 border-b border-slate-200">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-bold">Shopping Cart</h2>
                        <button id="closeCart" class="text-slate-400 hover:text-slate-600">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="cartItems" class="p-6 max-h-96 overflow-y-auto">
                    <!-- Cart items -->
                </div>
                <div class="p-6 border-t border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-bold">Total: $<span id="cartTotal">0</span></span>
                    </div>
                    <button id="checkoutBtn" class="w-full bg-black text-white py-3 rounded-lg font-bold hover:bg-slate-800 transition">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('Added to cart!');
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        function updateQuantity(id, quantity) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity = Math.max(1, quantity);
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                renderCart();
            }
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-slate-500 text-center">Your cart is empty.</p>';
                cartTotal.textContent = '0';
                return;
            }

            let total = 0;
            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex gap-4 mb-4 pb-4 border-b border-slate-100">
                        <img src="${item.image || 'placeholder.jpg'}" alt="${item.title}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-semibold">${item.title}</h4>
                            <p class="text-sm text-slate-500">$${item.price}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center text-xs">-</button>
                                <span class="text-sm">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" class="w-6 h-6 rounded border border-slate-200 flex items-center justify-center text-xs">+</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-semibold">$${itemTotal.toFixed(2)}</p>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 text-sm mt-1">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
            cartTotal.textContent = total.toFixed(2);
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition cursor-pointer';
            card.onclick = () => window.location.href = `product.html?id=${product.id}`;

            card.innerHTML = `
                <div class="aspect-square bg-slate-200 relative">
                    ${product.image ? `<img src="${product.image}" alt="${product.title}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-slate-400">No Image</div>'}
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-2">${product.title}</h3>
                    <p class="text-slate-600 text-sm mb-3 line-clamp-2">${product.description}</p>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-xl">$${product.price}</span>
                        <button onclick="event.stopPropagation(); addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})" class="bg-black text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-800 transition">
                            ${product.category === 'fitting' ? 'Request Quote' : 'Add to Cart'}
                        </button>
                    </div>
                </div>
            `;

            return card;
        }

        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/products`);
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                console.error('Failed to load products:', error);
                document.getElementById('productGrid').innerHTML = '<p class="text-center text-slate-500">Failed to load products.</p>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const noProducts = document.getElementById('noProducts');

            if (products.length === 0) {
                grid.innerHTML = '';
                noProducts.classList.remove('hidden');
                return;
            }

            noProducts.classList.add('hidden');
            grid.innerHTML = '';
            products.forEach(product => {
                grid.appendChild(createProductCard(product));
            });
        }

        function filterProducts() {
            const category = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allProducts;

            if (category) {
                filtered = filtered.filter(p => p.category === category);
            }

            if (search) {
                filtered = filtered.filter(p =>
                    p.title.toLowerCase().includes(search) ||
                    p.description.toLowerCase().includes(search)
                );
            }

            renderProducts(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartCount();
            loadProducts();
            checkAuth();

            document.getElementById('cartLink').addEventListener('click', (e) => {
                e.preventDefault();
                renderCart();
                document.getElementById('cartModal').classList.remove('hidden');
            });

            document.getElementById('closeCart').addEventListener('click', () => {
                document.getElementById('cartModal').classList.add('hidden');
            });

            document.getElementById('categoryFilter').addEventListener('change', filterProducts);
            document.getElementById('searchInput').addEventListener('input', filterProducts);

            document.getElementById('checkoutBtn').addEventListener('click', () => {
                if (cart.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }
                window.location.href = 'checkout.html';
            });
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/customer/me', { credentials: 'include' });
                if (res.ok) {
                    document.getElementById('userLink').href = 'orders.html';
                    document.getElementById('userLink').innerHTML = '<i class="fa-solid fa-user text-xl"></i>';
                } else {
                    document.getElementById('userLink').href = 'customer-login.html';
                }
            } catch {
                document.getElementById('userLink').href = 'customer-login.html';
            }
        }
    </script>
</body>
</html></content>
