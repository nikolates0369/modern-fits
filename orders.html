<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Modern Fits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between gap-4">
                <a href="index.html" class="text-xl font-bold text-black tracking-tight">MODERN<span class="text-gray-400">FITS</span></a>

                <div class="flex items-center gap-5 text-gray-700">
                    <a href="#" id="logoutLink"><i class="fa-solid fa-sign-out-alt text-xl"></i></a>
                    <a href="#" id="cartLink" class="relative">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-black text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">My Orders</h1>
        <div id="ordersList" class="space-y-6">
            <!-- Orders will be loaded here -->
        </div>
        <div id="noOrders" class="hidden text-center py-12">
            <p class="text-slate-500">You have no orders yet.</p>
            <a href="shop.html" class="text-black font-bold underline">Start shopping</a>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/customer/me', { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = 'customer-login.html';
                }
            } catch {
                window.location.href = 'customer-login.html';
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            const noOrders = document.getElementById('noOrders');

            if (orders.length === 0) {
                list.innerHTML = '';
                noOrders.classList.remove('hidden');
                return;
            }

            noOrders.classList.add('hidden');
            list.innerHTML = orders.map(order => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold">Order #${order.id}</h3>
                            <p class="text-sm text-slate-500">Placed on ${new Date(order.createdAt).toLocaleDateString()}</p>
                            <p class="text-sm text-slate-500">Status: <span class="capitalize">${order.status}</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-bold">$${order.total.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${order.items.map(item => `
                            <div class="flex justify-between items-center">
                                <span class="text-sm">${item.title} x${item.quantity}</span>
                                <span class="text-sm font-semibold">$${(item.price * item.quantity).toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-200">
                        <h4 class="font-semibold mb-2">Shipping Address</h4>
                        <p class="text-sm text-slate-600">
                            ${order.shippingInfo.firstName} ${order.shippingInfo.lastName}<br>
                            ${order.shippingInfo.address}<br>
                            ${order.shippingInfo.city}, ${order.shippingInfo.zipCode}<br>
                            ${order.shippingInfo.email} | ${order.shippingInfo.phone}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        async function loadOrders() {
            try {
                const response = await fetch('/api/orders', { credentials: 'include' });
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                console.error('Failed to load orders:', error);
                document.getElementById('ordersList').innerHTML = '<p class="text-center text-slate-500">Failed to load orders.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            updateCartCount();
            loadOrders();

            document.getElementById('cartLink').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'shop.html';
            });

            document.getElementById('logoutLink').addEventListener('click', async (e) => {
                e.preventDefault();
                await fetch('/api/customer/logout', { method: 'POST', credentials: 'include' });
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
