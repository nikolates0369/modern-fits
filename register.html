<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Modern Fits</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
            <h1 class="text-2xl font-bold mb-6">Create Account</h1>
            <div id="registerStatus" class="mb-4 text-sm"></div>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Username</label>
                    <input id="registerUsername" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email</label>
                    <input id="registerEmail" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Password</label>
                    <input id="registerPassword" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition">Register</button>
            </form>
            <p class="text-center mt-4 text-sm text-slate-600">
                Already have an account? <a href="customer-login.html" class="text-black font-bold">Log In</a>
            </p>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('registerStatus');
        const form = document.getElementById('registerForm');

        function setStatus(message, error = false) {
            statusEl.textContent = message;
            statusEl.className = error ? 'mb-4 text-sm text-red-600' : 'mb-4 text-sm text-emerald-600';
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            setStatus('Registering...', false);

            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            try {
                const res = await fetch('/api/customer/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password })
                });

                if (!res.ok) {
                    const err = await res.json();
                    setStatus(err.error || 'Registration failed', true);
                    return;
                }

                window.location.href = 'shop.html';
            } catch (err) {
                setStatus('Network error. Try again.', true);
            }
        });
    </script>
</body>
</html>
