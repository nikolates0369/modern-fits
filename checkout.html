<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Modern Fits</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div class="max-w-4xl mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6">Checkout</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div>
                <h2 class="text-xl font-bold mb-4">Shipping Information</h2>
                <form id="checkoutForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">First Name</label>
                            <input id="firstName" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Last Name</label>
                            <input id="lastName" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email</label>
                        <input id="email" type="email" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Phone</label>
                        <input id="phone" type="tel" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Address</label>
                        <input id="address" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">City</label>
                            <input id="city" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-500 mb-1">ZIP Code</label>
                            <input id="zipCode" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm outline-none focus:ring-2 focus:ring-black" required>
                        </div>
                    </div>
                </form>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-4">Order Summary</h2>
                <div id="orderSummary" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200">
                    <!-- Order items will be loaded here -->
                </div>
                <button id="placeOrderBtn" class="w-full bg-black text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition mt-4">
                    Place Order
                </button>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderOrderSummary() {
            const summary = document.getElementById('orderSummary');
            if (cart.length === 0) {
                summary.innerHTML = '<p class="text-slate-500">Your cart is empty.</p>';
                return;
            }

            let total = 0;
            const itemsHtml = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm">${item.title} x${item.quantity}</span>
                        <span class="text-sm font-bold">$${itemTotal.toFixed(2)}</span>
                    </div>
                `;
            }).join('');

            summary.innerHTML = `
                ${itemsHtml}
                <hr class="my-4">
                <div class="flex justify-between items-center font-bold">
                    <span>Total</span>
                    <span>$${total.toFixed(2)}</span>
                </div>
            `;
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/customer/me', { credentials: 'include' });
                if (!res.ok) {
                    window.location.href = 'customer-login.html';
                }
            } catch {
                window.location.href = 'customer-login.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            renderOrderSummary();

            document.getElementById('placeOrderBtn').addEventListener('click', async () => {
                const form = document.getElementById('checkoutForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                const shippingInfo = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    zipCode: document.getElementById('zipCode').value
                };

                try {
                    const res = await fetch('/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ items: cart, shippingInfo })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert(err.error || 'Failed to place order');
                        return;
                    }

                    localStorage.removeItem('cart');
                    alert('Order placed successfully!');
                    window.location.href = 'shop.html';
                } catch (err) {
                    alert('Network error. Try again.');
                }
            });
        });
    </script>
</body>
</html>
